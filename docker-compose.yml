services:
  db:
    image: postgres:16-alpine
    container_name: novamed-db
    environment:
      POSTGRES_USER: novamed
      POSTGRES_PASSWORD: novamed
      POSTGRES_DB: novamed
    ports:
      - "5432:5432"
    volumes:
      - novamed_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novamed -d novamed"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  novamed_pgdata:
