# Load-balancer NovaMed (HA) — rozklada ruch na repliki backendu.
# Docker DNS rozwiazuje nazwe `api` na wszystkie repliki (round-robin).
upstream novamed_api {
    server api:8000 max_fails=3 fail_timeout=10s;
    # przy --scale api=N Docker dopisuje kolejne instancje pod ta sama nazwa
    keepalive 32;
}

server {
    listen 80;

    # nie balansujemy sond — odpytujemy upstream, ktory sam wypina nie-gotowe instancje
    location / {
        proxy_pass http://novamed_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # instancja z bledem/timeoutem -> nginx probuje kolejna replike
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
    }
}
