# Serwowanie SPA NovaMed (React/Vite). Routing po stronie klienta -> wszystkie
# nieznane sciezki zwracaja index.html (history API). Statyki cache'owane.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # zasoby z hashem w nazwie -> dlugi cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: kazda trasa -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # drobne utwardzenie naglowkow (TLS i HSTS robi Caddy wyzej)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
